name: 'Build Windows binary'
description: 'Build SurrealDB binary for Windows'

inputs:
  arch:
    description: 'Target architecture (x86_64-pc-windows-msvc)'
    required: true
  platform:
    description: 'Platform name (amd64)'
    required: true
  name:
    description: 'The name of output'
    required: true
  version-override:
    description: 'Version override (for nightly builds)'
    required: false
    default: ''
  build-metadata:
    description: 'Build metadata'
    required: false
    default: ''
  onnx-version:
    description: 'The ONNX library version'
    required: false
    default: '1.23.2'
  extra-features:
    description: 'Extra features enabled in the binary'
    required: false
    default: 'storage-tikv,jwks,ml'
  upload:
    description: 'Upload build artifacts'
    required: false
    default: 'true'
  release:
    description: 'Compile with release flag'
    required: false
    default: 'true'

outputs:
  artifact-name:
    description: 'Name of the uploaded artifact'
    value: surreal-${{ inputs.name }}.windows-${{ inputs.platform }}

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      uses: ./.github/actions/setup-environment
      with:
        targets: ${{ inputs.arch }}
        # Persist the sccache disk cache as a single Swatinem entry instead of letting
        # sccache fill the 10 GiB repo GHA cache with hundreds of individual crate entries.
        cache-directories: 'C:\sccache'
        save-cache: 'true'

    - name: Configure sccache for Windows
      shell: bash
      run: |
        # sccache-action starts the daemon before we can configure it, so stop it and
        # restart it with the correct settings for this runner.
        #
        # SCCACHE_GHA_ENABLED=false / SCCACHE_DIR: switch from the GHA cache backend
        # (which stores one entry per crate and quickly exhausts the shared 10 GiB repo
        # cache, causing silent write failures) to a local disk cache that Swatinem
        # saves as a single compressed GHA entry between runs.
        #
        # SCCACHE_CACHE_SIZE: cap disk usage so the Swatinem-managed entry stays small.
        #
        # SCCACHE_IDLE_TIMEOUT=0: the default 600 s idle timeout shuts the daemon down
        # while surrealdb-core is still compiling (~16 min, the last crate to build).
        #
        # SCCACHE_MAX_FRAME_LENGTH=2 GiB: on warm runs sccache sends cached .rlib
        # contents back to the client over its IPC channel; the surrealdb-core .rlib
        # exceeds tokio_util's default 8 MiB LengthDelimitedCodec frame limit.
        sccache --stop-server || true
        export SCCACHE_GHA_ENABLED=false
        export SCCACHE_DIR='C:\sccache'
        export SCCACHE_CACHE_SIZE='2G'
        export SCCACHE_IDLE_TIMEOUT=0
        export SCCACHE_MAX_FRAME_LENGTH=2147483648
        sccache --start-server
        echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
        echo "SCCACHE_DIR=C:\\sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_CACHE_SIZE=2G" >> "$GITHUB_ENV"
        echo "SCCACHE_IDLE_TIMEOUT=0" >> "$GITHUB_ENV"
        echo "SCCACHE_MAX_FRAME_LENGTH=2147483648" >> "$GITHUB_ENV"

    - name: Output package versions
      shell: bash
      run: |
        set -x
        set +e
        go version ; cargo version ; rustc --version ; cmake --version ; gcc --version ; g++ --version ; perl -v

    - name: Prepare dependencies
      shell: bash
      run: vcpkg integrate install

    - name: Build binary
      shell: bash
      env:
        SURREAL_BUILD_VERSION: ${{ inputs.version-override }}
        SURREAL_BUILD_METADATA: ${{ inputs.build-metadata }}
      run: |
        set -x

        # Build
        extra_args=""
        compile_profile="debug"
        if [[ "${{ inputs.name }}" == "ci" && "${{ inputs.upload }}" == "false" ]]; then
          extra_args="${extra_args} --features ${{ inputs.extra-features }}"
        else
          extra_args="${extra_args} --features default"
          if [[ ! -z "${{ inputs.extra-features }}" ]]; then
            extra_args="${extra_args} --features ${{ inputs.extra-features }}"
          fi
        fi
        if [[ "${{ inputs.release }}" == "true" ]]; then
          extra_args="${extra_args} --release"
          compile_profile="release"
        fi

        # Download libonnxruntime's static library and tell ORT crate to use it
        tmp_dir=$(mktemp -d)
        curl -sSL https://github.com/supertone-inc/onnxruntime-build/releases/download/v${{ inputs.onnx-version }}/onnxruntime-win-x64-static_lib-${{ inputs.onnx-version }}.zip -o $tmp_dir/onnxruntime.zip
        unzip -d $tmp_dir $tmp_dir/onnxruntime.zip
        export ORT_STRATEGY=system ORT_LIB_LOCATION=$tmp_dir/lib

        cargo build --no-default-features ${extra_args} --locked --target ${{ inputs.arch }}

        # Package
        ./target/${{ inputs.arch }}/${compile_profile}/surreal.exe version
        cp target/${{ inputs.arch }}/${compile_profile}/surreal.exe surreal-${{ inputs.name }}.windows-${{ inputs.platform }}.exe
        echo $(certutil -hashfile surreal-${{ inputs.name }}.windows-${{ inputs.platform }}.exe SHA256 | sed -n '2p') > surreal-${{ inputs.name }}.windows-${{ inputs.platform }}.txt

    - name: Upload artifacts
      if: ${{ inputs.upload == 'true' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: surreal-${{ inputs.name }}.windows-${{ inputs.platform }}
        path: |
          surreal-${{ inputs.name }}.windows-${{ inputs.platform }}.exe
          surreal-${{ inputs.name }}.windows-${{ inputs.platform }}.txt
