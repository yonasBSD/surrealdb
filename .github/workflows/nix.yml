name: Nix

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'rust-toolchain.toml'
      - 'flake.nix'
      - 'flake.lock'
      - 'pkg/nix/**'
      - '.github/workflows/nix.yml'

# Setting the shell option, it will run 'bash --noprofile --norc -eo pipefail {0}'
defaults:
  run:
    shell: bash

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  build:
    name: Build native Linux binary and Docker image
    runs-on: ubuntu-latest
    env:
      # Trusted refs (main / tags) get full access: Cachix push and smoke tests.
      # On any other ref cachix runs read-only to prevent cache poisoning, and
      # built binaries are never executed to avoid running unreviewed code.
      IS_TRUSTED_REF: ${{ github.ref == 'refs/heads/main' || github.ref_type == 'tag' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # (Actions must be pinned by commit hash) v6.0.2

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # (Actions must be pinned by commit hash) v31.10.4

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # (Actions must be pinned by commit hash) v17
        env:
          CACHIX_AUTH_TOKEN: ${{ env.IS_TRUSTED_REF == 'true' && secrets.CACHIX_AUTH_TOKEN || '' }}
        with:
          name: surrealdb
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - run: nix build .#x86_64-unknown-linux-gnu

      - name: Smoke-test binary
        if: env.IS_TRUSTED_REF == 'true'
        run: ./result/bin/surreal help

      - run: nix build .#docker-image

      - name: Smoke-test Docker image
        if: env.IS_TRUSTED_REF == 'true'
        run: docker load --input ./result

